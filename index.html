<style>
  :root{
    --bg-void:#0a0118;
    --purple-deep:#2d0a5e;
    --purple-mid:#5b1a9e;
    --magenta:#c026d3;
    --gold:#f4c94e;
    --gold-deep:#c9971f;
    --gold-light:#fde68a;
    --cream:#fff7e0;
    --green-whats:#22c55e;
    --green-whats-deep:#16a34a;
    --font-display:'Baloo 2', 'Arial Black', sans-serif;
    --font-body:'Nunito', Arial, sans-serif;
  }

  @font-face{
    font-family:'Baloo 2';
    src:local('Arial Black');
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html,body{
    height:100%;
    overflow:hidden;
    background:var(--bg-void);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
  }

  body{
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }

  /* ============ FONDO TRAGAMONEDAS ============ */
  .bg-layer{
    position:fixed;
    inset:0;
    z-index:0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(192,38,211,0.35), transparent 60%),
      radial-gradient(ellipse 60% 50% at 10% 90%, rgba(91,26,158,0.4), transparent 60%),
      radial-gradient(ellipse 60% 50% at 90% 90%, rgba(91,26,158,0.4), transparent 60%),
      linear-gradient(180deg, #1a0633 0%, #0a0118 100%);
  }

  /* Máquina tragamonedas realista de fondo */
  .slot-machine-bg{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:0;
    width:min(120vw, 720px);
    opacity:0.5;
    pointer-events:none;
  }

  .reel-window{
    overflow:hidden;
  }
  .reel-strip-svg{
    animation:reelSpinSvg 3.4s linear infinite;
  }
  .reel-strip-svg.r2{ animation-duration:4.1s; animation-delay:-0.4s; }
  .reel-strip-svg.r3{ animation-duration:3.8s; animation-delay:-1.1s; }
  @keyframes reelSpinSvg{
    from{transform:translateY(0);}
    to{transform:translateY(-320px);}
  }

  .sparkle{
    position:fixed;
    z-index:1;
    pointer-events:none;
    color:var(--gold-light);
    opacity:0;
    animation:sparkleFade 2.4s ease-in-out infinite;
  }
  @keyframes sparkleFade{
    0%,100%{opacity:0; transform:scale(0.5) rotate(0deg);}
    50%{opacity:0.9; transform:scale(1.1) rotate(180deg);}
  }

  .glow-orb{
    position:fixed;
    border-radius:50%;
    filter:blur(60px);
    z-index:0;
    animation:orbPulse 5s ease-in-out infinite;
  }
  @keyframes orbPulse{
    0%,100%{opacity:0.4; transform:scale(1);}
    50%{opacity:0.7; transform:scale(1.15);}
  }

  /* ============ CONTENEDOR PRINCIPAL ============ */
  .stage{
    position:relative;
    z-index:5;
    width:100%;
    max-width:430px;
    height:100%;
    max-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
    padding:14px 16px 16px;
    gap:6px;
  }

  /* ============ HEADER / LOGO ============ */
  .brand{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    flex-shrink:0;
  }
  .brand-mark{
    font-family:var(--font-display);
    font-weight:900;
    font-size:clamp(22px, 7vw, 30px);
    letter-spacing:0.5px;
    background:linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 45%, var(--gold-deep) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    filter:drop-shadow(0 2px 0 #7a4f08) drop-shadow(0 4px 8px rgba(0,0,0,0.5));
    text-transform:uppercase;
  }
  .brand-mark .accent{
    background:linear-gradient(180deg, #fff 0%, #e9d5ff 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    filter:drop-shadow(0 2px 0 #6b21a8) drop-shadow(0 4px 8px rgba(0,0,0,0.5));
  }

  /* ============ JOKERS ============ */
  .jokers-row{
    display:flex;
    align-items:flex-end;
    justify-content:center;
    gap:2px;
    flex-shrink:0;
    margin-top:-4px;
  }
  .joker-svg{
    filter:drop-shadow(0 6px 14px rgba(0,0,0,0.55));
  }
  .joker-center{
    width:78px;
    z-index:3;
    animation:jokerBob 3s ease-in-out infinite;
  }
  .joker-side{
    width:54px;
    opacity:0.92;
  }
  .joker-side.left{
    margin-bottom:6px;
    transform:rotate(-8deg);
    animation:jokerBob 3.4s ease-in-out infinite 0.3s;
  }
  .joker-side.right{
    margin-bottom:6px;
    transform:rotate(8deg);
    animation:jokerBob 3.4s ease-in-out infinite 0.6s;
  }
  @keyframes jokerBob{
    0%,100%{transform:translateY(0) rotate(var(--r,0deg));}
    50%{transform:translateY(-6px) rotate(var(--r,0deg));}
  }
  .joker-side.left{--r:-8deg;}
  .joker-side.right{--r:8deg;}

  /* ============ TITULAR ============ */
  .headline{
    text-align:center;
    flex-shrink:0;
  }
  .headline .line1{
    font-family:var(--font-display);
    font-weight:800;
    font-size:clamp(21px, 7vw, 27px);
    color:#fff;
    text-shadow:0 2px 6px rgba(0,0,0,0.6);
    letter-spacing:0.3px;
    line-height:1.08;
  }
  .headline .line2{
    font-family:var(--font-display);
    font-weight:900;
    font-size:clamp(19px, 6vw, 23px);
    margin-top:3px;
    background:linear-gradient(180deg, var(--gold-light), var(--gold-deep));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    letter-spacing:0.5px;
    text-transform:uppercase;
    line-height:1.08;
  }

  .bonus-block{
    position:relative;
    text-align:center;
    flex-shrink:0;
    padding:6px 0 2px;
  }
  .bonus-pct{
    font-family:var(--font-display);
    font-weight:900;
    font-size:clamp(72px, 22vw, 104px);
    line-height:0.85;
    background:linear-gradient(180deg, #fff8dc 0%, var(--gold) 35%, var(--gold-deep) 70%, #8a5a0f 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    filter:
      drop-shadow(0 0 24px rgba(244,201,78,0.7))
      drop-shadow(0 4px 0 #5c3a08);
    letter-spacing:-2px;
    display:inline-block;
    animation:bonusPulse 1.8s ease-in-out infinite;
    transform-origin:center;
  }
  @keyframes bonusPulse{
    0%, 100%{
      transform:scale(1);
      filter:
        drop-shadow(0 0 24px rgba(244,201,78,0.7))
        drop-shadow(0 4px 0 #5c3a08);
    }
    50%{
      transform:scale(1.055);
      filter:
        drop-shadow(0 0 38px rgba(244,201,78,0.95))
        drop-shadow(0 4px 0 #5c3a08);
    }
  }
  .bonus-sub{
    font-family:var(--font-display);
    font-weight:800;
    font-size:clamp(16px, 5vw, 20px);
    color:var(--gold-light);
    text-transform:uppercase;
    letter-spacing:1px;
    margin-top:10px;
    text-shadow:0 2px 4px rgba(0,0,0,0.5);
    animation:subFlicker 1.8s ease-in-out infinite;
  }
  @keyframes subFlicker{
    0%, 100%{opacity:0.85;}
    50%{opacity:1;}
  }
  .bonus-tag{
    display:inline-block;
    margin-top:8px;
    padding:5px 16px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(244,201,78,0.4);
    border-radius:30px;
    font-size:clamp(11px, 3.4vw, 13px);
    font-weight:700;
    color:#fff;
    letter-spacing:0.3px;
  }
  .bonus-tag svg{vertical-align:-3px; margin-right:4px;}

  /* ============ CARTAS DECORATIVAS ============ */
  .cards-decor{
    width:100%;
    max-width:280px;
    flex-shrink:0;
    opacity:0.92;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,0.4));
  }

  /* ============ CHECK LINE ============ */
  .check-line{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    flex-shrink:0;
  }
  .check-line .circle{
    width:18px; height:18px;
    border-radius:50%;
    background:var(--gold);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .check-line span{
    font-size:clamp(11px, 3.4vw, 13px);
    font-weight:700;
    color:#fff;
    letter-spacing:0.2px;
  }

  /* ============ CTA WHATSAPP ============ */
  .cta-wrap{
    width:100%;
    flex-shrink:0;
  }
  .cta-whats{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:9px;
    padding:15px 12px;
    border-radius:50px;
    border:none;
    background:linear-gradient(180deg, #34d873 0%, var(--green-whats) 45%, var(--green-whats-deep) 100%);
    box-shadow:
      0 6px 0 #0f6b2c,
      0 10px 22px rgba(34,197,94,0.5);
    cursor:pointer;
    text-decoration:none;
    transition:transform 0.12s, box-shadow 0.12s;
  }
  .cta-whats:active{
    transform:translateY(4px);
    box-shadow:0 2px 0 #0f6b2c, 0 4px 10px rgba(34,197,94,0.4);
  }
  .cta-whats .label{
    font-family:var(--font-display);
    font-weight:800;
    font-size:clamp(14px, 4.6vw, 17px);
    color:#fff;
    text-shadow:0 1px 2px rgba(0,0,0,0.25);
    letter-spacing:0.2px;
  }
  .cta-pulse{
    position:relative;
  }
  .cta-pulse::after{
    content:'';
    position:absolute;
    inset:-3px;
    border-radius:50px;
    border:2px solid rgba(34,197,94,0.6);
    animation:pulseRing 1.8s ease-out infinite;
  }
  @keyframes pulseRing{
    0%{transform:scale(1); opacity:0.8;}
    100%{transform:scale(1.06); opacity:0;}
  }

  .trust-line{
    text-align:center;
    font-size:10px;
    color:rgba(255,255,255,0.55);
    margin-top:8px;
    letter-spacing:0.2px;
    flex-shrink:0;
  }
  .trust-line svg{vertical-align:-2px; margin-right:3px;}

  /* responsive tightening for short screens */
  @media (max-height: 760px){
    .stage{gap:3px; padding:10px 14px 10px;}
    .joker-center{width:58px;}
    .joker-side{width:40px;}
  }
  @media (max-height: 640px){
    .cards-decor{display:none;}
    .check-line{display:none;}
    .joker-center{width:48px;}
    .joker-side{width:32px;}
  }
</style>
</head>

<script>
/* =====================================================================
   GANA24 — TRACKING SUITE (backend Vercel KV)
   Mide visitas reales vs bots, interacción, y clics a WhatsApp.
   Los eventos se envían a /api/track y se guardan en Vercel KV.
   El panel admin.html lee de /api/metrics (protegido con contraseña).
   ===================================================================== */
(function(){

  const WHATSAPP_NUMBER = "5491127089169"; // +54 9 11 2708-9169
  const WHATSAPP_MESSAGE = "Cargar y obtener bono de bienvenida";
  const SESSION_KEY = "gana24_session_id";

  function uuid(){
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c){
      const r = Math.random()*16|0, v = c==='x'?r:(r&0x3|0x8);
      return v.toString(16);
    });
  }

  // ---------- Session setup ----------
  let sessionId = sessionStorage.getItem(SESSION_KEY);
  if(!sessionId){
    sessionId = uuid();
    sessionStorage.setItem(SESSION_KEY, sessionId);
  }

  const urlParams = new URLSearchParams(window.location.search);
  const visitRecord = {
    id: sessionId,
    ts: Date.now(),
    isoDate: new Date().toISOString(),
    userAgent: navigator.userAgent,
    referrer: document.referrer || "(directo)",
    utm_source: urlParams.get('utm_source') || null,
    utm_campaign: urlParams.get('utm_campaign') || null,
    utm_medium: urlParams.get('utm_medium') || null,
    utm_content: urlParams.get('utm_content') || null,
    fbclid: urlParams.get('fbclid') || null,
    screenW: window.screen.width,
    screenH: window.screen.height,
    lang: navigator.language,
    mouseMoves: 0,
    scrollEvents: 0,
    touchEvents: 0,
    timeOnPage: 0,
    reachedCTA: false,
    clickedWhatsapp: false,
    isBot: false,
    botReasons: []
  };

  // ---------- Detección de bots: paso 1 — user agent ----------
  const BOT_UA_PATTERNS = [
    /bot/i, /spider/i, /crawl/i, /facebookexternalhit/i, /headless/i,
    /phantom/i, /selenium/i, /puppeteer/i, /playwright/i, /curl/i,
    /wget/i, /python-requests/i, /scrapy/i, /ahrefs/i, /semrush/i,
    /lighthouse/i, /pingdom/i, /uptimerobot/i, /datadog/i
  ];
  BOT_UA_PATTERNS.forEach(function(pattern){
    if(pattern.test(navigator.userAgent)){
      visitRecord.isBot = true;
      visitRecord.botReasons.push('user-agent:' + pattern.source);
    }
  });

  // ---------- Detección de bots: paso 2 — propiedades del navegador ----------
  if(navigator.webdriver === true){
    visitRecord.isBot = true;
    visitRecord.botReasons.push('webdriver-flag');
  }
  if(!navigator.languages || navigator.languages.length === 0){
    visitRecord.botReasons.push('no-languages');
  }
  if(window.screen.width === 0 || window.screen.height === 0){
    visitRecord.isBot = true;
    visitRecord.botReasons.push('zero-screen');
  }

  // ---------- Detección de bots: paso 3 — comportamiento (avanzado) ----------
  let mouseMoveCount = 0;
  let scrollCount = 0;
  let touchCount = 0;
  let firstInteractionTime = null;
  const pageLoadTime = Date.now();

  function markInteraction(){
    if(!firstInteractionTime) firstInteractionTime = Date.now();
  }

  window.addEventListener('mousemove', function(){
    mouseMoveCount++;
    markInteraction();
  }, { passive:true });

  window.addEventListener('scroll', function(){
    scrollCount++;
    markInteraction();
  }, { passive:true });

  window.addEventListener('touchstart', function(){
    touchCount++;
    markInteraction();
  }, { passive:true });

  window.addEventListener('touchmove', function(){
    touchCount++;
    markInteraction();
  }, { passive:true });

  // ---------- Envío de eventos al backend ----------
  function sendToServer(payload){
    try{
      const body = JSON.stringify(payload);
      // sendBeacon es más confiable en beforeunload / cierre de pestaña
      if(navigator.sendBeacon){
        const blob = new Blob([body], { type: 'application/json' });
        navigator.sendBeacon('/api/track', blob);
      } else {
        fetch('/api/track', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: body,
          keepalive: true
        }).catch(function(){});
      }
    }catch(e){ /* silencioso: el tracking nunca debe romper la landing */ }
  }

  // Registrar visita inicial
  sendToServer(visitRecord);

  // ---------- Evaluación periódica de comportamiento ----------
  const behaviorCheckInterval = setInterval(function(){
    const elapsed = (Date.now() - pageLoadTime) / 1000;
    const totalInteractions = mouseMoveCount + scrollCount + touchCount;

    let botReasons = [];
    let likelyBot = visitRecord.isBot;

    if(elapsed > 4 && totalInteractions === 0){
      botReasons.push('zero-interaction-after-4s');
      likelyBot = true;
    }

    sendToServer({
      id: sessionId,
      update: true,
      mouseMoves: mouseMoveCount,
      scrollEvents: scrollCount,
      touchEvents: touchCount,
      timeOnPage: Math.round(elapsed),
      isBot: likelyBot,
      botReasons: visitRecord.botReasons.concat(botReasons)
    });

  }, 4000);

  // Guardar tiempo final al salir
  window.addEventListener('beforeunload', function(){
    const elapsed = (Date.now() - pageLoadTime) / 1000;
    sendToServer({
      id: sessionId,
      update: true,
      timeOnPage: Math.round(elapsed),
      mouseMoves: mouseMoveCount,
      scrollEvents: scrollCount,
      touchEvents: touchCount
    });
  });

  // ---------- Sparkles decorativos ----------
  const sparkleContainer = document.getElementById('sparkles-container');
  const sparkleChars = ['✦','✧','⭐','✨'];
  for(let i=0;i<10;i++){
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = sparkleChars[Math.floor(Math.random()*sparkleChars.length)];
    s.style.left = Math.random()*100 + 'vw';
    s.style.top = Math.random()*100 + 'vh';
    s.style.fontSize = (8 + Math.random()*10) + 'px';
    s.style.animationDelay = (Math.random()*2.4) + 's';
    sparkleContainer.appendChild(s);
  }

  // ---------- Botón WhatsApp ----------
  // El href ya está fijo en el HTML (no depende de JS para funcionar).
  const ctaBtn = document.getElementById('ctaWhatsapp');

  ctaBtn.addEventListener('click', function(){
    try{
      sendToServer({
        id: sessionId,
        update: true,
        clickedWhatsapp: true,
        reachedCTA: true
      });

      // Meta Pixel — evento de conversión (Lead / Contact)
      if(typeof fbq === 'function'){
        fbq('track', 'Lead', {
          content_name: 'Gana24 - Bono Bienvenida 200%',
          content_category: 'casino_landing'
        });
        fbq('track', 'Contact');
      }
    }catch(e){ /* el tracking nunca debe bloquear el click al botón */ }
  });

})();
</script>
